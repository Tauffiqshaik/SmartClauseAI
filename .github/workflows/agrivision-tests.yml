name: Agrivision v3 Automated Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    defaults:
      run:
        working-directory: ./agrivision-tests
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Selenium E2E Tests
      run: npm run test:selenium
      
    - name: Run Security Tests
      run: npm run test:security
      
    - name: Run Appium Mobile Tests
      run: npm run test:appium
      
    - name: Generate Excel & HTML Reports
      run: npm run generate-reports
      
    - name: Upload Test Reports Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          agrivision-tests/reports/
          agrivision-tests/screenshots/
          
    - name: Commit and Push Reports
      uses: stefanzweifel/git-auto-commit-action@v5
      if: always()
      with:
        commit_message: "chore: update agrivision test reports"
        file_pattern: 'agrivision-tests/reports/* agrivision-tests/screenshots/*'
