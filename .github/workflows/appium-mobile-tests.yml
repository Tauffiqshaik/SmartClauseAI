name: Mobile App Appium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: macos-latest # macOS runners support hardware acceleration for Android Emulators
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android Debug APK
        working-directory: ./app
        run: ./gradlew assembleDebug

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Appium Dependencies
        working-directory: ./mobile-tests
        run: |
          npm install
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium Server
        run: appium &
        
      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          script: |
            cd mobile-tests
            node test/run-appium.js

      - name: Upload Excel Report
        uses: actions/upload-artifact@v3
        with:
          name: appium-report
          path: ./reports/Appium_Report.xlsx
